# nixnet host identity schema reference
# This file documents the expected structure — it is not enforced programmatically in v1.

# Every host identity lives at: world/hosts/<name>/identity.yaml

schema:
  name:
    type: string
    required: true
    description: "Unique host identity name (e.g., vic, fnix, kivm)"

  role:
    type: string
    required: true
    description: "Role name matching a directory in world/roles/"
    examples: [primary, server, lab, throwaway]

  lifecycle:
    type: string
    required: true
    values: [active, dormant, retired, destroyed]
    description: "Current lifecycle state. Enrollment is an action, not a state."

  description:
    type: string
    required: false
    description: "Human-readable purpose or notes"

  tags:
    type: list
    required: false
    description: "Freeform tags for filtering or grouping"

  machine_class:
    type: string
    required: false
    description: "Physical form factor: laptop, desktop, vm, vps, sbc"

  created:
    type: datetime
    required: true
    description: "When this identity was first created (ISO 8601)"

  claim:
    type: object
    required: false
    description: "Which machine currently holds this identity"
    fields:
      machine_id:
        type: string
        description: "From /etc/machine-id — stable across reboots"
      hostname:
        type: string
        description: "System hostname at claim time"
      claimed_at:
        type: datetime
        description: "When this machine claimed the identity"
      os:
        type: string
        description: "OS version string at claim time"
      kernel:
        type: string
        description: "Kernel version at claim time"

# ══════════════════════════════════════════════
# What nixnet manages in v1
# ══════════════════════════════════════════════
#
# MANAGES:
#   - Host identity (create, claim, lifecycle transitions)
#   - Apt packages (install only, never remove)
#   - Dotfiles and config files (symlink for user-space, copy for system paths)
#   - Lifecycle state tracking (active, dormant, retired, destroyed)
#   - Local runtime metadata (~/.local/nixnet/)
#   - Enrollment (fresh and adopt)
#   - Layer resolution (global → role → host, union merge)
#   - Basic health checks (nixnet doctor)
#
# DOES NOT MANAGE:
#   - VM or machine creation
#   - Package removal or version pinning
#   - Arbitrary file watching or drift detection
#   - Backup or disaster recovery
#   - Secrets, encryption, or vaults
#   - Remote execution or orchestration
#   - Service management (systemd units)
#   - Monitoring, alerting, or dashboards
#   - Tailscale or SSH configuration (treated as existing infrastructure)
#
# ══════════════════════════════════════════════

# Notes:
# - A host identity can exist without a claim (lifecycle: dormant)
# - Destroying a VM moves identity to dormant, NOT destroyed
# - Only explicit 'nixnet lifecycle set destroyed' terminates an identity
# - The claim block is updated when a new machine claims the identity
# - Old claims are not automatically archived in v1 (future: claim history)
